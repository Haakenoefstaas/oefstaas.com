<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="yClNcrgA8yhJERCYt2-HZmyXBl8LaDMRbQ2EXZTgzko" />
    <meta name="description" content="The world's first flower-shaped guitar pedals. OEFSTAAS — coming soon.">
    <meta name="title" content="OEFSTAAS">
    <title>OEFSTAAS</title>
    <link rel="stylesheet" href="https://use.typekit.net/fyj3azi.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "arboria", sans-serif;
            overflow-x: hidden;
        }

        /* ── SECTION 1 — HERO ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('grass.jpg');
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 220px;
            z-index: 10;
        }

        .flawer-img {
            width: 80%;
            max-width: 900px;
            position: relative;
            z-index: 5;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 10;
            animation: bounce 2s infinite;
        }

        .scroll-indicator span {
            display: block;
            width: 1px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.6);
        }

        .scroll-indicator::after {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-right: 1px solid rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
            transform: rotate(45deg);
            margin-top: -8px;
        }

        @keyframes bounce {
            0%, 100% { opacity: 1; transform: translateX(-50%) translateY(0); }
            50% { opacity: 0.4; transform: translateX(-50%) translateY(8px); }
        }

        /* ── SECTION 2 — FLAWER TEXT ── */
        .flawer-section {
            width: 100vw;
            height: 100vh;
            background-image: url('grass.jpg');
            background-size: cover;
            background-position: center bottom;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .flawer-title {
            font-family: "arboria", sans-serif;
            font-weight: 700;
            font-size: clamp(80px, 18vw, 220px);
            color: white;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
        }

        .flawer-subtitle {
            font-family: "arboria", sans-serif;
            font-weight: 300;
            font-size: clamp(14px, 2vw, 22px);
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.08em;
            text-align: center;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.85em;
            background-color: rgba(255, 255, 255, 0.85);
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .logo {
                width: 130px;
                top: 20px;
                left: 20px;
            }

            .flawer-img {
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <!-- SECTION 1 — HERO -->
    <section class="hero">
        <img class="logo" src="oefstaas_logo_potential.png" alt="OEFSTAAS">
        <img class="flawer-img" src="flawerhero_final.png" alt="FLAWER">
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <!-- SECTION 2 — FLAWER TEXT -->
    <section class="flawer-section">
        <h1 class="flawer-title">FLAWER</h1>
        <p class="flawer-subtitle">coming soon<span class="cursor"></span></p>
    </section>

</body>
</html>
