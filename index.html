<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="google-site-verification" content="yClNcrgA8yhJERCYt2-HZmyXBl8LaDMRbQ2EXZTgzko" />
    <meta name="description" content="The world's first flower-shaped guitar pedals. FLAWER coming soon.">
    <meta name="title" content="OEFSTAAS">
    <title>OEFSTAAS</title>
    <link rel="stylesheet" href="https://use.typekit.net/fyj3azi.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        body {
            font-family: "arboria", sans-serif;
        }

        /* ── GRASS WRAPPER ── */
        .grass-wrapper {
            width: 100%;
            background-image: url('grass.jpg');
            background-size: cover;
            background-position: center 50%;
            background-repeat: no-repeat;
        }

        /* ── SECTION 1 — HERO ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 280px;
            z-index: 10;
        }

        .flawer-img {
            width: 100%;
            max-width: 2100px;
            position: relative;
            z-index: 5;
            display: block;
        }

        /* ── SECTION 2 — FLAWER TEXT ── */
        .flawer-section {
            width: 100vw;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding-bottom: 400px;
        }

        .flawer-title {
            font-family: "arboria", sans-serif;
            font-weight: 700;
            font-size: clamp(80px, 18vw, 220px);
            color: white;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
        }

        .flawer-subtitle {
            font-family: "arboria", sans-serif;
            font-weight: 500;
            font-size: clamp(16px, 2.5vw, 28px);
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.08em;
            text-align: center;
        }

        /* ── FOOTER ── */
        .footer {
            width: 100%;
            background-color: #0a0a0a;
            padding: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-logo {
            width: 160px;
            opacity: 0.8;
        }

        .footer-right {
            text-align: right;
        }

        .footer-right p {
            font-family: "arboria", sans-serif;
            font-weight: 300;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.05em;
            line-height: 1.8;
        }

        /* ── MOBILE PORTRAIT ── */
        @media (max-width: 768px) {

            .grass-wrapper {
                background-position: center 50%;
                background-size: cover;
            }

            .logo {
                width: 130px;
                top: 20px;
                left: 20px;
            }

            .flawer-img {
                width: 160%;
                max-width: 160%;
                mix-blend-mode: screen;
            }

            .flawer-title {
                font-size: clamp(60px, 20vw, 120px);
            }

            .flawer-subtitle {
                font-size: clamp(14px, 4vw, 20px);
            }

            .footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
                padding: 30px 20px;
            }

            .footer-right {
                text-align: center;
            }

            .flawer-section {
                padding-bottom: 120px;
                height: 80vh;
            }
        }

        /* ── MOBILE LANDSCAPE ── */
        @media (max-width: 900px) and (orientation: landscape) {
            .hero {
                height: auto;
                padding: 80px 0 40px 0;
            }

            .flawer-section {
                height: auto;
                padding: 60px 0;
            }

            .flawer-img {
                width: 60%;
                max-width: 60%;
                mix-blend-mode: screen;
            }

            .logo {
                width: 100px;
                top: 15px;
                left: 15px;
            }

            .flawer-title {
                font-size: clamp(50px, 12vw, 100px);
            }
        }

    </style>
</head>
<body>

    <!-- GRASS WRAPPER -->
    <div class="grass-wrapper">

        <!-- SECTION 1 — HERO -->
        <section class="hero">
            <img class="logo" src="OEFSTAAS_LOGO_WHITE.png" alt="OEFSTAAS">

            <!-- Video for all devices — screen blend mode handles mobile black background -->
            <video class="flawer-img" autoplay loop muted playsinline>
                <source src="flawer.webm" type="video/webm">
            </video>
        </section>

        <!-- SECTION 2 — FLAWER TEXT -->
        <section class="flawer-section">
            <h1 class="flawer-title">FLAWER</h1>
            <p class="flawer-subtitle">coming soon...</p>
        </section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <img class="footer-logo" src="OEFSTAAS_LOGO_WHITE.png" alt="OEFSTAAS">
        <div class="footer-right">
            <p>© 2026 Håken Øfstaas. All rights reserved.</p>
            <p>OEFSTAAS™ — Norway</p>
            <p>oefstaas.com</p>
        </div>
    </footer>

</body>
</html>
