<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="yClNcrgA8yhJERCYt2-HZmyXBl8LaDMRbQ2EXZTgzko" />
    <meta name="description" content="The world's first flower-shaped guitar pedals. OEFSTAAS — coming soon.">
    <meta name="title" content="OEFSTAAS">
    <title>OEFSTAAS</title>
    <link rel="stylesheet" href="https://use.typekit.net/fyj3azi.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "arboria", sans-serif;
            overflow-x: hidden;
        }

        /* ── GRASS WRAPPER — one tall background ── */
        .grass-wrapper {
            width: 100%;
            background-image: url('grass.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
        }

        /* ── SECTION 1 — HERO ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 320px;
            z-index: 10;
        }

        .flawer-img {
            width: 150%;
            max-width: 1400px;
            position: relative;
            z-index: 5;
        }

        /* ── SECTION 2 — FLAWER TEXT ── */
        .flawer-section {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .flawer-title {
            font-family: "arboria", sans-serif;
            font-weight: 700;
            font-size: clamp(80px, 18vw, 220px);
            color: white;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
        }

        .flawer-subtitle {
            font-family: "arboria", sans-serif;
            font-weight: 500;
            font-size: clamp(16px, 2.5vw, 28px);
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.08em;
            text-align: center;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.85em;
            background-color: rgba(255, 255, 255, 0.95);
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── FOOTER ── */
        .footer {
            width: 100%;
            background-color: #0a0a0a;
            padding: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-logo {
            width: 160px;
            opacity: 0.8;
        }

        .footer-right {
            text-align: right;
        }

        .footer-right p {
            font-family: "arboria", sans-serif;
            font-weight: 300;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.05em;
            line-height: 1.8;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .logo {
                width: 150px;
                top: 20px;
                left: 20px;
            }

            .flawer-img {
                width: 100%;
            }

            .flawer-title {
                font-size: clamp(60px, 20vw, 120px);
            }

            .flawer-subtitle {
                font-size: clamp(14px, 4vw, 20px);
            }

            .footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
                padding: 30px 20px;
            }

            .footer-right {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- GRASS WRAPPER — contains both sections on one tall background -->
    <div class="grass-wrapper">

        <!-- SECTION 1 — HERO -->
        <section class="hero">
            <img class="logo" src="OEFSTAAS_LOGO_WHITE.png" alt="OEFSTAAS">
            <img class="flawer-img" src="flawerhero_final.png" alt="FLAWER">
        </section>

        <!-- SECTION 2 — FLAWER TEXT -->
        <section class="flawer-section">
            <h1 class="flawer-title">FLAWER</h1>
            <p class="flawer-subtitle">coming soon<span class="cursor"></span></p>
        </section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <img class="footer-logo" src="OEFSTAAS_LOGO_WHITE.png" alt="OEFSTAAS">
        <div class="footer-right">
            <p>© 2026 Håken Øfstaas. All rights reserved.</p>
            <p>OEFSTAAS™ — Trondheim, Norway</p>
            <p>oefstaas.com</p>
        </div>
    </footer>

</body>
</html>
