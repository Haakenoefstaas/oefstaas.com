<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="yClNcrgA8yhJERCYt2-HZmyXBl8LaDMRbQ2EXZTgzko" />
    <meta name="description" content="The world's first flower-shaped guitar pedals. OEFSTAAS — coming soon.">
    <meta name="title" content="OEFSTAAS">
    <title>OEFSTAAS</title>
    <link rel="stylesheet" href="https://use.typekit.net/fyj3azi.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: white;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 250px;
            z-index: 10;
        }

        .coming-soon {
            position: absolute;
            bottom: 45px;
            right: 60px;
            font-family: "arboria", sans-serif;
            font-weight: 500;
            font-style: normal;
            font-size: 35px;
            color: #111111;
            letter-spacing: 0.05em;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: #111111;
            margin-left: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .logo {
                width: 110px;
                top: 20px;
                left: 20px;
            }

            .coming-soon {
                font-size: 14px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline>
        <source src="flawer.webm" type="video/webm">
    </video>

    <img class="logo" src="oefstaas_logo_potential.png" alt="OEFSTAAS">

    <div class="coming-soon">
        coming soon...<span class="cursor"></span>
    </div>

</body>
</html>
